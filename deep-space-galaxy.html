<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Deep-Space Galaxy Background</title>
  <style>
    :root {
      --space-black: #030506;
      --space-deep: #04100c;
      --green-core: #56ffb0;
      --green-soft: #1ecf86;
      --green-faint: rgba(86, 255, 176, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 10%, #06140f 0%, var(--space-black) 42%, #010203 100%);
      color: #dcffef;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    /* Container keeps layered elements easy to manage and responsive. */
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
      background:
        radial-gradient(1200px 800px at 62% 44%, rgba(38, 200, 124, 0.15) 0%, rgba(22, 109, 72, 0.07) 24%, transparent 62%),
        radial-gradient(900px 600px at 58% 52%, rgba(99, 255, 184, 0.08) 0%, transparent 58%);
    }

    /* Soft atmospheric glow on top of stars for a galaxy feel. */
    .nebula-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        radial-gradient(circle at 58% 46%, rgba(96, 255, 187, 0.22) 0%, rgba(66, 234, 162, 0.12) 20%, transparent 52%),
        radial-gradient(circle at 50% 54%, rgba(67, 176, 122, 0.1) 0%, transparent 52%);
      filter: blur(14px) saturate(1.2);
      opacity: 0.9;
      animation: nebulaPulse 10s ease-in-out infinite alternate;
    }

    @keyframes nebulaPulse {
      from { transform: scale(1) translate3d(0, 0, 0); opacity: 0.85; }
      to { transform: scale(1.06) translate3d(-0.6%, 0.4%, 0); opacity: 1; }
    }

    /* Main canvas: stars + particles + shooting stars. */
    #spaceCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    /* Foreground vignette keeps contrast cinematic and reduces edge distraction. */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 44%, rgba(1, 3, 4, 0.45) 78%, rgba(0, 0, 0, 0.75) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.2), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.28));
    }

    /* Tiny helper label so file is visibly alive when opened standalone. */
    .hud {
      position: absolute;
      z-index: 4;
      left: clamp(12px, 2vw, 22px);
      bottom: clamp(12px, 2vw, 22px);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(96, 255, 187, 0.24);
      background: rgba(3, 13, 10, 0.52);
      color: rgba(186, 255, 221, 0.9);
      font-size: clamp(11px, 1.2vw, 13px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
      backdrop-filter: blur(8px);
    }

    @media (prefers-reduced-motion: reduce) {
      .nebula-glow { animation: none; }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <canvas id="spaceCanvas" aria-hidden="true"></canvas>
    <div class="nebula-glow" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="hud">Greenline Galaxy</div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('spaceCanvas');
      const ctx = canvas.getContext('2d', { alpha: true });
      const scene = document.getElementById('scene');
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      let width = 0;
      let height = 0;
      let cx = 0;
      let cy = 0;
      let time = 0;

      // Mouse interaction remains subtle to avoid distraction.
      const pointer = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };

      // Three depth layers produce parallax and depth.
      const stars = [];
      const shootingStars = [];
      const STAR_COUNT = 420;
      const SHOOTING_MAX = 6;

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function resize() {
        width = scene.clientWidth;
        height = scene.clientHeight;
        cx = width * 0.58; // Slightly off-center galaxy core
        cy = height * 0.47;

        canvas.width = Math.floor(width * DPR);
        canvas.height = Math.floor(height * DPR);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }

      function createStar() {
        const depth = rand(0.2, 1); // depth controls parallax + speed
        return {
          x: rand(0, width),
          y: rand(0, height),
          z: depth,
          r: rand(0.4, 1.8) * depth,
          drift: rand(0.05, 0.22) * depth,
          twinkle: rand(0, Math.PI * 2),
          twinkleSpeed: rand(0.004, 0.022),
          hueShift: rand(-8, 8)
        };
      }

      function createShootingStar() {
        const startX = rand(-width * 0.25, width * 1.15);
        const startY = rand(-height * 0.4, height * 0.3);
        const angle = rand(Math.PI * 0.95, Math.PI * 1.1); // mostly downward
        const speed = rand(3.5, 7);

        return {
          x: startX,
          y: startY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(38, 72),
          maxLife: 72,
          len: rand(80, 160),
          glow: rand(0.45, 0.8)
        };
      }

      function seedScene() {
        stars.length = 0;
        for (let i = 0; i < STAR_COUNT; i += 1) {
          stars.push(createStar());
        }

        shootingStars.length = 0;
        for (let i = 0; i < Math.min(2, SHOOTING_MAX); i += 1) {
          shootingStars.push(createShootingStar());
        }
      }

      function drawNebula() {
        const px = (pointer.x - 0.5) * 28;
        const py = (pointer.y - 0.5) * 20;

        // Core glow
        const g1 = ctx.createRadialGradient(cx + px, cy + py, 0, cx + px, cy + py, Math.min(width, height) * 0.36);
        g1.addColorStop(0, 'rgba(96, 255, 187, 0.38)');
        g1.addColorStop(0.2, 'rgba(62, 227, 151, 0.22)');
        g1.addColorStop(0.55, 'rgba(26, 125, 84, 0.08)');
        g1.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = g1;
        ctx.fillRect(0, 0, width, height);

        // Spiral-like wisps (lightweight arcs)
        ctx.save();
        ctx.translate(cx + px, cy + py);
        ctx.rotate(0.2 + Math.sin(time * 0.0002) * 0.04);

        for (let i = 0; i < 8; i += 1) {
          const radius = 70 + i * 36;
          const alpha = Math.max(0.025, 0.16 - i * 0.015);
          ctx.beginPath();
          ctx.strokeStyle = `rgba(83, 255, 178, ${alpha.toFixed(3)})`;
          ctx.lineWidth = Math.max(1, 3.4 - i * 0.26);
          ctx.filter = 'blur(2px)';
          ctx.arc(0, 0, radius, i * 0.45, i * 0.45 + Math.PI * 1.25);
          ctx.stroke();
        }
        ctx.filter = 'none';
        ctx.restore();
      }

      function updateAndDrawStars() {
        const driftYBase = prefersReduced ? 0.015 : 0.06;

        for (let i = 0; i < stars.length; i += 1) {
          const s = stars[i];
          s.twinkle += s.twinkleSpeed;

          // Depth-based parallax with soft pointer influence.
          const parallaxX = (pointer.x - 0.5) * 36 * s.z;
          const parallaxY = (pointer.y - 0.5) * 26 * s.z;

          s.y += driftYBase + s.drift * (prefersReduced ? 0.2 : 1);
          if (s.y > height + 4) {
            s.y = -4;
            s.x = rand(0, width);
          }

          const twinkleBoost = 0.65 + Math.sin(s.twinkle) * 0.35;
          const alpha = 0.2 + s.z * 0.6 * twinkleBoost;

          ctx.beginPath();
          ctx.fillStyle = `rgba(${120 + s.hueShift}, 255, ${190 + s.hueShift}, ${alpha.toFixed(3)})`;
          ctx.arc(s.x + parallaxX, s.y + parallaxY, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function updateAndDrawShootingStars() {
        if (prefersReduced) return;

        // Spawn chance tuned to remain calm.
        if (shootingStars.length < SHOOTING_MAX && Math.random() < 0.012) {
          shootingStars.push(createShootingStar());
        }

        for (let i = shootingStars.length - 1; i >= 0; i -= 1) {
          const s = shootingStars[i];
          s.x += s.vx;
          s.y += s.vy;
          s.life -= 1;

          const t = Math.max(0, s.life / s.maxLife);
          const alpha = Math.min(1, t * 1.3) * s.glow;

          const tailX = s.x - s.vx * (s.len / 10);
          const tailY = s.y - s.vy * (s.len / 10);

          const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
          grad.addColorStop(0, `rgba(156,255,214,${alpha.toFixed(3)})`);
          grad.addColorStop(1, 'rgba(156,255,214,0)');

          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(tailX, tailY);
          ctx.stroke();

          if (s.life <= 0 || s.x < -200 || s.x > width + 200 || s.y > height + 200) {
            shootingStars.splice(i, 1);
          }
        }
      }

      function frame(ts) {
        time = ts || performance.now();

        // Ease pointer for smooth, calm interaction.
        pointer.x += (pointer.tx - pointer.x) * 0.03;
        pointer.y += (pointer.ty - pointer.y) * 0.03;

        ctx.clearRect(0, 0, width, height);

        drawNebula();
        updateAndDrawStars();
        updateAndDrawShootingStars();

        requestAnimationFrame(frame);
      }

      function onPointerMove(event) {
        pointer.tx = event.clientX / Math.max(width, 1);
        pointer.ty = event.clientY / Math.max(height, 1);
      }

      window.addEventListener('resize', () => {
        resize();
        seedScene();
      });

      window.addEventListener('pointermove', onPointerMove, { passive: true });
      window.addEventListener('pointerleave', () => {
        pointer.tx = 0.5;
        pointer.ty = 0.5;
      });

      resize();
      seedScene();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
